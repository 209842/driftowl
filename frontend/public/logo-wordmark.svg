<svg width="480" height="80" viewBox="0 0 480 80" xmlns="http://www.w3.org/2000/svg">
  <!--
    DriftOwl wordmark — icon + logotype
    Icon scaled to 64×64, centered vertically in 80px strip
    Text: "DriftOwl" in geometric sans-serif
  -->

  <!-- MARK (64×64, offset 8px top for vertical centering) -->
  <!-- All coordinates = original 200×200 * 0.32, then offset x+0, y+8 -->
  <!-- Nodes: Top(32,22.7) Right(47.7,48.6) Left(16.3,48.6), centroid(32,40) -->

  <!-- Outer arcs -->
  <path d="M32,22.7 Q49.3,28.5 47.7,48.6"
        fill="none" stroke="#0A0A0F" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M47.7,48.6 Q32,55.2 16.3,48.6"
        fill="none" stroke="#0A0A0F" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M16.3,48.6 Q14.7,28.5 32,22.7"
        fill="none" stroke="#0A0A0F" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Spokes -->
  <line x1="32"   y1="22.7" x2="32"   y2="40" stroke="#0A0A0F" stroke-width="0.9" opacity="0.2" stroke-linecap="round"/>
  <line x1="47.7" y1="48.6" x2="32"   y2="40" stroke="#0A0A0F" stroke-width="0.9" opacity="0.2" stroke-linecap="round"/>
  <line x1="16.3" y1="48.6" x2="32"   y2="40" stroke="#0A0A0F" stroke-width="0.9" opacity="0.2" stroke-linecap="round"/>

  <!-- Agent nodes -->
  <circle cx="32"   cy="22.7" r="3.2" fill="#0A0A0F"/>
  <circle cx="47.7" cy="48.6" r="3.2" fill="#0A0A0F"/>
  <circle cx="16.3" cy="48.6" r="3.2" fill="#0A0A0F"/>

  <!-- Equilibrium center -->
  <circle cx="32" cy="40" r="2" fill="#0A0A0F"/>

  <!-- Divider -->
  <line x1="76" y1="20" x2="76" y2="60" stroke="#0A0A0F" stroke-width="1" opacity="0.12"/>

  <!-- Logotype: "DriftOwl" -->
  <text
    x="92" y="51"
    font-family="'SF Pro Display', -apple-system, 'Inter', 'Helvetica Neue', sans-serif"
    font-size="30"
    font-weight="700"
    letter-spacing="-1"
    fill="#0A0A0F">DriftOwl</text>
</svg>
